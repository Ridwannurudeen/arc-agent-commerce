name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  contracts:
    name: Solidity (Foundry)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: foundry-rs/foundry-toolchain@v1
      - name: Check formatting
        run: forge fmt --check
      - name: Build contracts
        run: forge build --sizes
      - name: Run tests
        run: forge test -vvv

  sdk-unit:
    name: Python SDK (unit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]" 2>/dev/null || pip install -e . && pip install pytest ruff
      - name: Lint
        run: ruff check . --exclude examples/
      - name: Run unit tests
        run: python -m pytest tests/ -v --ignore=tests/test_read_operations.py --ignore=tests/test_write_operations.py

  sdk-live:
    name: Python SDK (live testnet)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]" 2>/dev/null || pip install -e . && pip install pytest
      - name: Run live read tests
        run: python -m pytest tests/test_read_operations.py -v
        continue-on-error: true

  sdk-ts:
    name: TypeScript SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk-ts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm install
      - name: Build
        run: npx tsc --noEmit

  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm install
      - name: Build
        run: npm run build
